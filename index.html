<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Nest SEA — Adventure Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0f;
    --surface: #10121a;
    --surface2: #161922;
    --border: #2a2f45;
    --border-glow: #4a6fa5;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #7a6030;
    --teal: #3dd6c8;
    --teal-dim: #1a6b65;
    --red: #e05c5c;
    --purple: #9b72cf;
    --text: #d4d8e8;
    --text-dim: #7a80a0;
    --text-muted: #3a4060;
    --checked-bg: #0d1a12;
    --checked-border: #2d5a3d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    padding: 0 0 60px;
    position: relative;
    overflow-x: hidden;
  }

  /* Background atmosphere */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(74,111,165,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 80% 80%, rgba(155,114,207,0.08) 0%, transparent 50%),
      radial-gradient(ellipse 40% 20% at 10% 60%, rgba(61,214,200,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* Decorative stars */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 73% 8%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 42% 35%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 45%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 6% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 15%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 95% 25%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 85%, rgba(255,255,255,0.25) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* Header */
  header {
    text-align: center;
    padding: 48px 0 32px;
    position: relative;
  }

  .header-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 12px;
  }

  .ornament-line {
    height: 1px;
    width: 80px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), var(--gold));
    flex: 1;
    max-width: 120px;
  }
  .ornament-line.right {
    background: linear-gradient(90deg, var(--gold), var(--gold-dim), transparent);
  }

  .ornament-diamond {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    box-shadow: 0 0 8px var(--gold);
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 700;
    color: var(--gold-light);
    text-shadow: 0 0 30px rgba(201,168,76,0.5), 0 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 2px;
    line-height: 1.3;
  }

  .subtitle {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--text-dim);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* Reset banner */
  .reset-banner {
    background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(74,111,165,0.08));
    border: 1px solid var(--border);
    border-top: 1px solid var(--gold-dim);
    border-radius: 8px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 28px;
  }

  .reset-info {
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .reset-info span {
    color: var(--gold);
  }

  .btn-reset-all {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 1px;
    color: var(--red);
    border: 1px solid rgba(224,92,92,0.3);
    background: rgba(224,92,92,0.07);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-reset-all:hover {
    background: rgba(224,92,92,0.18);
    border-color: var(--red);
    box-shadow: 0 0 8px rgba(224,92,92,0.2);
  }

  /* Controls row */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    align-items: stretch;
  }

  .btn-primary {
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--bg);
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    box-shadow: 0 0 16px rgba(201,168,76,0.4);
  }

  .btn-secondary {
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--teal);
    background: rgba(61,214,200,0.07);
    border: 1px solid rgba(61,214,200,0.3);
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-secondary:hover {
    background: rgba(61,214,200,0.14);
    border-color: var(--teal);
    box-shadow: 0 0 12px rgba(61,214,200,0.2);
  }

  /* Section cards */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
    transition: box-shadow 0.3s;
  }
  .section-card:hover {
    box-shadow: 0 0 24px rgba(74,111,165,0.12);
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    cursor: pointer;
    user-select: none;
    position: relative;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    transition: background 0.2s;
  }
  .section-header:hover {
    background: #1c2030;
  }

  .section-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
  }

  .section-title-wrap {
    flex: 1;
    min-width: 0;
  }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .section-meta {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .section-badge {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 20px;
    flex-shrink: 0;
  }

  .badge-weekly { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid rgba(201,168,76,0.25); }
  .badge-daily  { background: rgba(61,214,200,0.1);  color: var(--teal); border: 1px solid rgba(61,214,200,0.2); }
  .badge-once   { background: rgba(155,114,207,0.1); color: var(--purple); border: 1px solid rgba(155,114,207,0.2); }

  .section-progress {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .progress-fill { color: var(--gold); }

  .section-chevron {
    font-size: 0.7rem;
    color: var(--text-muted);
    transition: transform 0.3s;
    flex-shrink: 0;
  }
  .section-card.collapsed .section-chevron {
    transform: rotate(-90deg);
  }

  .section-body {
    padding: 16px 20px;
    overflow: hidden;
  }

  .section-card.collapsed .section-body {
    display: none;
  }

  /* Character rows */
  .char-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .char-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: rgba(255,255,255,0.02);
    transition: all 0.2s;
    cursor: pointer;
  }
  .char-row:hover {
    border-color: var(--border-glow);
    background: rgba(74,111,165,0.06);
  }
  .char-row.done {
    background: var(--checked-bg);
    border-color: var(--checked-border);
    opacity: 0.7;
  }

  /* Custom checkbox */
  .char-check {
    width: 20px; height: 20px;
    border: 1.5px solid var(--border-glow);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }
  .char-row.done .char-check {
    background: #2d7a45;
    border-color: #3da85e;
    box-shadow: 0 0 8px rgba(61,168,94,0.4);
  }
  .char-check-icon {
    display: none;
    color: #fff;
    font-size: 12px;
    line-height: 1;
  }
  .char-row.done .char-check-icon {
    display: block;
  }

  .char-name {
    flex: 1;
    font-family: 'Cinzel', serif;
    font-size: 0.88rem;
    color: var(--text);
    transition: color 0.2s;
  }
  .char-row.done .char-name {
    color: var(--text-dim);
    text-decoration: line-through;
    text-decoration-color: var(--text-muted);
  }

  .char-class {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-style: italic;
  }

  .char-del {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 6px;
    border-radius: 3px;
    transition: all 0.15s;
    line-height: 1;
  }
  .char-del:hover {
    color: var(--red);
    background: rgba(224,92,92,0.1);
  }

  /* Add char row */
  .add-char-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .input-field {
    font-family: 'Crimson Pro', serif;
    font-size: 0.95rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
    flex: 1;
    min-width: 120px;
  }
  .input-field::placeholder { color: var(--text-muted); font-style: italic; }
  .input-field:focus { border-color: var(--border-glow); }

  .btn-add-char {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 1px;
    color: var(--teal);
    background: rgba(61,214,200,0.07);
    border: 1px solid rgba(61,214,200,0.25);
    padding: 8px 14px;
    border-radius: 5px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .btn-add-char:hover {
    background: rgba(61,214,200,0.14);
    border-color: var(--teal);
  }

  /* Section-level controls */
  .section-controls {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .btn-small {
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    letter-spacing: 0.8px;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-check-all {
    color: #3da85e;
    background: rgba(45,122,69,0.1);
    border: 1px solid rgba(45,122,69,0.3);
  }
  .btn-check-all:hover { background: rgba(45,122,69,0.2); }

  .btn-uncheck-all {
    color: var(--text-dim);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
  }
  .btn-uncheck-all:hover { background: rgba(255,255,255,0.08); }

  .section-del-btn {
    margin-left: auto;
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    letter-spacing: 0.8px;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--red);
    background: rgba(224,92,92,0.07);
    border: 1px solid rgba(224,92,92,0.2);
    transition: all 0.15s;
  }
  .section-del-btn:hover { background: rgba(224,92,92,0.18); }

  /* Divider */
  .section-divider {
    text-align: center;
    margin: 32px 0 20px;
    position: relative;
  }
  .section-divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }
  .section-divider span {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 3px;
    color: var(--text-muted);
    background: var(--bg);
    padding: 0 16px;
    position: relative;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border-glow);
    border-radius: 12px;
    padding: 28px 28px 24px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 60px rgba(74,111,165,0.2);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(-10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal h2 {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--gold-light);
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  .modal-field {
    margin-bottom: 14px;
  }
  .modal-field label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .modal-field .input-field { width: 100%; }

  .modal-field select {
    font-family: 'Crimson Pro', serif;
    font-size: 0.95rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    padding: 8px 12px;
    outline: none;
    width: 100%;
    cursor: pointer;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }
  .modal-field select:focus { border-color: var(--border-glow); }
  .modal-field select option { background: #161922; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 22px;
  }
  .modal-actions .btn-primary { flex: 1; padding: 10px; }
  .modal-cancel {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--border);
    padding: 10px 18px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-cancel:hover { background: rgba(255,255,255,0.05); }

  /* Progress bar in section header */
  .section-progress-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--teal-dim), var(--teal));
    transition: width 0.4s ease;
    border-radius: 0 2px 0 0;
  }

  @media (max-width: 500px) {
    .controls { flex-direction: column; }
    .modal { padding: 22px 18px 18px; }
    h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="header-ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line right"></div>
    </div>
    <h1>Dragon Nest SEA</h1>
    <div class="subtitle">Adventure Tracker</div>
  </header>

  <div class="reset-banner">
    <div class="reset-info">Weekly reset: <span id="nextReset">—</span> &nbsp;|&nbsp; Daily reset: <span id="nextDaily">—</span></div>
    <button class="btn-reset-all" onclick="resetAll()">↺ Reset All</button>
  </div>

  <div class="controls">
    <button class="btn-primary" onclick="openAddSection()">＋ Add Dungeon / Activity</button>
  </div>

  <div id="sections-container"></div>
</div>

<!-- Add Section Modal -->
<div class="modal-overlay" id="sectionModal">
  <div class="modal">
    <h2>✦ Add New Activity</h2>
    <div class="modal-field">
      <label>Activity Name</label>
      <input type="text" class="input-field" id="modalSectionName" placeholder="e.g. Bone Dragon Nest Light" />
    </div>
    <div class="modal-field">
      <label>Reset Type</label>
      <select id="modalSectionType">
        <option value="weekly">Weekly</option>
        <option value="daily">Daily</option>
        <option value="once">One-time</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Color Accent</label>
      <select id="modalSectionColor">
        <option value="#c9a84c">⬤ Gold</option>
        <option value="#3dd6c8">⬤ Teal</option>
        <option value="#9b72cf">⬤ Purple</option>
        <option value="#e05c5c">⬤ Red</option>
        <option value="#5c9ee0">⬤ Blue</option>
        <option value="#5ce06a">⬤ Green</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('sectionModal')">Cancel</button>
      <button class="btn-primary" onclick="confirmAddSection()">Create</button>
    </div>
  </div>
</div>

<script>
// ===================== STATE =====================
const DEFAULT_SECTIONS = [
  {
    id: 'efm', name: 'Erosion Fission Maze', type: 'weekly', color: '#c9a84c', collapsed: false,
    chars: [
      { id: 'c1', name: 'Silver Hunter', done: false },
      { id: 'c2', name: 'Light Fury', done: false },
      { id: 'c3', name: 'Duelist', done: false },
      { id: 'c4', name: 'Moonlord', done: false },
    ]
  },
  {
    id: 'aot', name: 'Ark of Transcendence', type: 'weekly', color: '#9b72cf', collapsed: false,
    chars: [
      { id: 'c1', name: 'Silver Hunter', done: false },
      { id: 'c2', name: 'Light Fury', done: false },
      { id: 'c3', name: 'Duelist', done: false },
      { id: 'c4', name: 'Moonlord', done: false },
    ]
  },
  {
    id: 'bdnl', name: 'Bone Dragon Nest Light', type: 'weekly', color: '#5c9ee0', collapsed: false,
    chars: [
      { id: 'c1', name: 'Silver Hunter', done: false },
      { id: 'c2', name: 'Light Fury', done: false },
    ]
  },
  {
    id: 'bdnh', name: 'Black Dragon Nest Hardcore', type: 'weekly', color: '#e05c5c', collapsed: false,
    chars: [
      { id: 'c1', name: 'Silver Hunter', done: false },
    ]
  },
];

// ===================== RESET EPOCH HELPERS =====================
function getLastWeeklyResetUTC() {
  const now = Date.now();
  const PH_OFFSET_MS = 8 * 3600000;
  const nowPH = new Date(now + PH_OFFSET_MS);
  // day 6 = Saturday in UTC when shifted to PH
  const dayOfWeekPH = nowPH.getUTCDay(); // 0=Sun, 6=Sat
  const daysSinceSat = (dayOfWeekPH + 1) % 7; // Sat=0, Sun=1 ... Fri=6
  // Build last Saturday 9AM PH as UTC
  const satPH = new Date(now + PH_OFFSET_MS);
  satPH.setUTCDate(nowPH.getUTCDate() - daysSinceSat);
  satPH.setUTCHours(9, 0, 0, 0);
  const satUTC = satPH.getTime() - PH_OFFSET_MS;
  return satUTC > now ? satUTC - 7 * 86400000 : satUTC;
}

function getLastDailyResetUTC() {
  const now = Date.now();
  const PH_OFFSET_MS = 8 * 3600000;
  const todayPH = new Date(now + PH_OFFSET_MS);
  todayPH.setUTCHours(9, 0, 0, 0);
  const resetUTC = todayPH.getTime() - PH_OFFSET_MS;
  return resetUTC > now ? resetUTC - 86400000 : resetUTC;
}

function load() {
  try {
    const saved = localStorage.getItem('dn_tracker_v2');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return {
    sections: JSON.parse(JSON.stringify(DEFAULT_SECTIONS)),
    lastWeeklyReset: getLastWeeklyResetUTC(),
    lastDailyReset: getLastDailyResetUTC(),
  };
}

function save() {
  try { localStorage.setItem('dn_tracker_v2', JSON.stringify(state)); } catch(e) {}
}

function checkAndAutoReset() {
  const currentWeekly = getLastWeeklyResetUTC();
  const currentDaily = getLastDailyResetUTC();
  let changed = false;

  if (!state.lastWeeklyReset || currentWeekly > state.lastWeeklyReset) {
    state.sections.forEach(s => {
      if (s.type === 'weekly') s.chars.forEach(c => c.done = false);
    });
    state.lastWeeklyReset = currentWeekly;
    changed = true;
  }

  if (!state.lastDailyReset || currentDaily > state.lastDailyReset) {
    state.sections.forEach(s => {
      if (s.type === 'daily') s.chars.forEach(c => c.done = false);
    });
    state.lastDailyReset = currentDaily;
    changed = true;
  }

  if (changed) save();
}

let state = load();

// ===================== RENDER =====================
function render() {
  const container = document.getElementById('sections-container');
  if (!state.sections.length) {
    container.innerHTML = `<div style="text-align:center;padding:48px 0;color:var(--text-muted);font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:2px;">No activities yet. Add one above.</div>`;
    return;
  }
  container.innerHTML = state.sections.map((sec, si) => renderSection(sec, si)).join('');
}

function renderSection(sec, si) {
  const total = sec.chars.length;
  const done = sec.chars.filter(c => c.done).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const badgeClass = { weekly: 'badge-weekly', daily: 'badge-daily', once: 'badge-once' }[sec.type] || 'badge-weekly';
  const badgeLabel = { weekly: 'Weekly', daily: 'Daily', once: 'One-time' }[sec.type];

  return `
  <div class="section-card ${sec.collapsed ? 'collapsed' : ''}" id="sec-${sec.id}">
    <div class="section-header" onclick="toggleCollapse(${si})">
      <div class="section-dot" style="background:${sec.color};color:${sec.color}"></div>
      <div class="section-title-wrap">
        <div class="section-title">${esc(sec.name)}</div>
        <div class="section-meta">${done} / ${total} characters</div>
      </div>
      <span class="section-badge ${badgeClass}">${badgeLabel}</span>
      <span class="section-progress"><span class="progress-fill">${done}</span>/${total}</span>
      <span class="section-chevron">▼</span>
      <div class="section-progress-bar" style="width:${pct}%;background:linear-gradient(90deg,${sec.color}66,${sec.color})"></div>
    </div>
    <div class="section-body">
      <div class="char-grid" id="chars-${sec.id}">
        ${sec.chars.map((ch, ci) => renderChar(sec, si, ch, ci)).join('')}
      </div>
      <div class="add-char-row">
        <input type="text" class="input-field" id="newchar-${sec.id}" placeholder="Character name..." onkeydown="if(event.key==='Enter')addChar(${si})" />
        <button class="btn-add-char" onclick="addChar(${si})">＋ Add</button>
      </div>
      <div class="section-controls">
        <button class="btn-small btn-check-all" onclick="checkAll(${si},true)">✓ All Done</button>
        <button class="btn-small btn-uncheck-all" onclick="checkAll(${si},false)">↺ Uncheck</button>
        <button class="section-del-btn btn-small" onclick="deleteSection(${si})">✕ Remove</button>
      </div>
    </div>
  </div>`;
}

function renderChar(sec, si, ch, ci) {
  return `
  <div class="char-row ${ch.done ? 'done' : ''}" onclick="toggleChar(${si},${ci})">
    <div class="char-check">
      <span class="char-check-icon">✓</span>
    </div>
    <span class="char-name">${esc(ch.name)}</span>
    <button class="char-del" onclick="event.stopPropagation();deleteChar(${si},${ci})" title="Remove">×</button>
  </div>`;
}

// ===================== ACTIONS =====================
function toggleChar(si, ci) {
  state.sections[si].chars[ci].done = !state.sections[si].chars[ci].done;
  save(); render();
}

function toggleCollapse(si) {
  state.sections[si].collapsed = !state.sections[si].collapsed;
  save(); render();
}

function addChar(si) {
  const input = document.getElementById(`newchar-${state.sections[si].id}`);
  const name = input ? input.value.trim() : '';
  if (!name) return;
  state.sections[si].chars.push({ id: 'c' + Date.now(), name, done: false });
  save(); render();
}

function deleteChar(si, ci) {
  if (!confirm('Remove this character?')) return;
  state.sections[si].chars.splice(ci, 1);
  save(); render();
}

function checkAll(si, val) {
  state.sections[si].chars.forEach(c => c.done = val);
  save(); render();
}

function deleteSection(si) {
  if (!confirm(`Remove "${state.sections[si].name}"?`)) return;
  state.sections.splice(si, 1);
  save(); render();
}

function resetAll() {
  if (!confirm('Reset all checkboxes for all activities?')) return;
  state.sections.forEach(s => s.chars.forEach(c => c.done = false));
  save(); render();
}

// ===================== ADD SECTION MODAL =====================
function openAddSection() {
  document.getElementById('modalSectionName').value = '';
  document.getElementById('sectionModal').classList.add('open');
  setTimeout(() => document.getElementById('modalSectionName').focus(), 100);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function confirmAddSection() {
  const name = document.getElementById('modalSectionName').value.trim();
  if (!name) { document.getElementById('modalSectionName').focus(); return; }
  const type = document.getElementById('modalSectionType').value;
  const color = document.getElementById('modalSectionColor').value;
  const id = 'sec_' + Date.now();
  state.sections.push({ id, name, type, color, collapsed: false, chars: [] });
  save(); render();
  closeModal('sectionModal');
}

// Close modal on overlay click
document.getElementById('sectionModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal('sectionModal');
});

// ===================== RESET TIMER =====================
function updateResetTimers() {
  const now = new Date();

  // Weekly reset: every Saturday 9AM PH time (UTC+8)
  const nowPH = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Manila' }));
  const nextWeek = new Date(now);
  const daysPH = (6 - nowPH.getDay() + 7) % 7 || 7;
  nextWeek.setDate(now.getDate() + daysPH);
  // Set to 9AM PH time (UTC+8 = 1AM UTC)
  nextWeek.setUTCHours(1, 0, 0, 0);
  if (nextWeek <= now) nextWeek.setDate(nextWeek.getDate() + 7);
  document.getElementById('nextReset').textContent = formatCountdown(nextWeek - now);

  // Daily reset: 9AM PH time (1AM UTC)
  const nextDay = new Date(now);
  nextDay.setUTCHours(1, 0, 0, 0);
  if (nextDay <= now) nextDay.setDate(nextDay.getDate() + 1);
  document.getElementById('nextDaily').textContent = formatCountdown(nextDay - now);
}

function formatCountdown(ms) {
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  if (d > 0) return `${d}d ${h}h ${m}m`;
  return `${h}h ${m}m`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===================== INIT =====================
checkAndAutoReset();
render();
updateResetTimers();
setInterval(() => { checkAndAutoReset(); render(); updateResetTimers(); }, 60000);
</script>
